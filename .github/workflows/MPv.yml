name: Build MPv (Windows X64)
on:
  workflow_dispatch:
    inputs:
      mpv_version:
        required: true
        default: v0.41.0
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Meson & Ninja
        run: pip install meson ninja
      
      - name: Download Toolchain
        shell: bash
        run: |
          curl -L https://github.com/mstorsjo/llvm-mingw/releases/download/20240320/llvm-mingw-20240320-msvcrt-x86_64.zip -o llvm-mingw.zip
          unzip -q llvm-mingw.zip
          mv llvm-mingw-20240320-msvcrt-x86_64 llvm-mingw
      
      - name: Clone mpv & Set Version
        shell: bash
        run: |
          git clone https://github.com/mpv-player/mpv.git
          cd mpv
          git fetch --tags
          git checkout tags/${{ inputs.mpv_version }}
          cat > version.sh << 'EOF'
#!/bin/sh
printf "Lyra"
EOF
          chmod +x version.sh
      
      - name: Prepare Dependencies
        shell: bash
        run: |
          cd mpv
          meson wrap update-db
          meson wrap install expat harfbuzz freetype2 libpng zlib
          mkdir -p subprojects
          
          echo "[wrap-git]" > subprojects/libass.wrap
          echo "url = https://github.com/libass/libass" >> subprojects/libass.wrap
          echo "revision = master" >> subprojects/libass.wrap
          echo "depth = 1" >> subprojects/libass.wrap
          
          echo "[wrap-git]" > subprojects/libplacebo.wrap
          echo "url = https://github.com/haasn/libplacebo" >> subprojects/libplacebo.wrap
          echo "revision = master" >> subprojects/libplacebo.wrap
          echo "depth = 1" >> subprojects/libplacebo.wrap
          echo "clone-recursive = true" >> subprojects/libplacebo.wrap
          
          echo "[wrap-git]" > subprojects/ffmpeg.wrap
          echo "url = https://gitlab.freedesktop.org/gstreamer/meson-ports/ffmpeg.git" >> subprojects/ffmpeg.wrap
          echo "revision = meson-8.0" >> subprojects/ffmpeg.wrap
          echo "depth = 1" >> subprojects/ffmpeg.wrap
          echo "[provide]" >> subprojects/ffmpeg.wrap
          echo "libavcodec = libavcodec_dep" >> subprojects/ffmpeg.wrap
          echo "libavdevice = libavdevice_dep" >> subprojects/ffmpeg.wrap
          echo "libavfilter = libavfilter_dep" >> subprojects/ffmpeg.wrap
          echo "libavformat = libavformat_dep" >> subprojects/ffmpeg.wrap
          echo "libavutil = libavutil_dep" >> subprojects/ffmpeg.wrap
          echo "libswresample = libswresample_dep" >> subprojects/ffmpeg.wrap
          echo "libswscale = libswscale_dep" >> subprojects/ffmpeg.wrap
      
      - name: Create Cross File
        shell: bash
        run: |
          WORKSPACE=$(pwd -W)
          echo "[binaries]" > mpv-cross.txt
          echo "c = '$WORKSPACE/llvm-mingw/bin/x86_64-w64-mingw32-clang.exe'" >> mpv-cross.txt
          echo "cpp = '$WORKSPACE/llvm-mingw/bin/x86_64-w64-mingw32-clang++.exe'" >> mpv-cross.txt
          echo "ar = '$WORKSPACE/llvm-mingw/bin/llvm-ar.exe'" >> mpv-cross.txt
          echo "strip = '$WORKSPACE/llvm-mingw/bin/llvm-strip.exe'" >> mpv-cross.txt
          echo "windres = '$WORKSPACE/llvm-mingw/bin/x86_64-w64-mingw32-windres.exe'" >> mpv-cross.txt
          echo "pkg-config = '$WORKSPACE/llvm-mingw/bin/x86_64-w64-mingw32-pkg-config.exe'" >> mpv-cross.txt
          echo "[host_machine]" >> mpv-cross.txt
          echo "system = 'windows'" >> mpv-cross.txt
          echo "cpu_family = 'x86_64'" >> mpv-cross.txt
          echo "cpu = 'x86_64'" >> mpv-cross.txt
          echo "endian = 'little'" >> mpv-cross.txt
          echo "[properties]" >> mpv-cross.txt
          echo "sys_root = '$WORKSPACE/llvm-mingw/x86_64-w64-mingw32'" >> mpv-cross.txt
          echo "pkg_config_libdir = '$WORKSPACE/llvm-mingw/x86_64-w64-mingw32/lib/pkgconfig'" >> mpv-cross.txt
          echo "prefer_static = true" >> mpv-cross.txt
      
      - name: Build MPv
        shell: bash
        run: |
          set -euo pipefail
          WORKSPACE=$(pwd -W)
          export PATH="$WORKSPACE/llvm-mingw/bin:$PATH"
          export CFLAGS="-O3 -march=x86-64-v3 -mtune=generic -mavx2 -funroll-loops -flto=full -fomit-frame-pointer -ffast-math -ffp-contract=fast -falign-functions=128 -falign-loops=32 -falign-jumps=32 -fno-unwind-tables -fno-asynchronous-unwind-tables -ffunction-sections -fdata-sections -fno-math-errno -fno-trapping-math"
          export CXXFLAGS="$CFLAGS -fno-rtti -fno-exceptions"
          export LDFLAGS="-flto=full -static -Wl,-O3 -Wl,--gc-sections -Wl,--icf=all -Wl,--sort-common -Wl,--as-needed"
          
          cd mpv
          meson setup build \
            --cross-file=../mpv-cross.txt \
            --buildtype=release \
            --prefix="$WORKSPACE/install" \
            -Ddefault_library=static \
            -Dprefer_static=true \
            -Db_lto=true \
            -Db_lto_mode=full \
            -Db_ndebug=if-release \
            -Doptimization=3 \
            -Dcplayer=true \
            -Dlibmpv=false \
            -Dbuild-date=false \
            -Dtests=false \
            -Dlua=disabled \
            -Djavascript=disabled \
            -Dcplugins=disabled \
            -Dcdda=disabled \
            -Ddvbin=disabled \
            -Ddvdnav=disabled \
            -Dlibbluray=disabled \
            -Dlibarchive=disabled \
            -Drubberband=disabled \
            -Dzimg=disabled \
            -Dlcms2=disabled \
            -Duchardet=disabled \
            -Dvapoursynth=disabled \
            -Dsdl2=disabled \
            -Dsdl2-gamepad=disabled \
            -Dsdl2-audio=disabled \
            -Dsdl2-video=disabled \
            -Dopenal=disabled \
            -Dwasapi=enabled \
            -Dd3d11=enabled \
            -Dd3d-hwaccel=enabled \
            -Dvulkan=enabled \
            -Dshaderc=enabled \
            -Dspirv-cross=enabled \
            -Dlibplacebo=enabled \
            -Dlibplacebo-next=enabled \
            -Degl=enabled \
            -Dgl=enabled \
            -Dgl-win32=enabled \
            -Dmanpage-build=disabled \
            -Dhtml-build=disabled \
            -Dpdf-build=disabled
          
          ninja -C build -j$(nproc)
          ../llvm-mingw/bin/llvm-strip.exe build/mpv.exe
          mv build/mpv.exe "$WORKSPACE/MPv.exe"
      
      - name: Upload MPv
        uses: actions/upload-artifact@v4
        with:
          name: MPv
          path: MPv.exe
